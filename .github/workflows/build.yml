name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  release-windows:
    name: Release Windows portable EXE
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Sync app version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+([\-+][0-9A-Za-z.-]+)?$') {
            throw "Tag '${{ github.ref_name }}' does not look like a SemVer version tag such as v0.1.5."
          }

          $env:APP_VERSION = $version
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

          npm version $version --no-git-tag-version --allow-same-version

          $tauriConfigPath = "src-tauri/tauri.conf.json"
          $tauriConfig = Get-Content $tauriConfigPath -Raw | ConvertFrom-Json
          $tauriConfig.version = $version
          $tauriConfig | ConvertTo-Json -Depth 100 | Set-Content $tauriConfigPath

          $cargoTomlPath = "src-tauri/Cargo.toml"
          $cargoToml = Get-Content $cargoTomlPath -Raw
          $cargoToml = [regex]::Replace($cargoToml, '(?m)^(version\s*=\s*)".*"$', "`${1}`"$version`"")
          Set-Content $cargoTomlPath $cargoToml -NoNewline

          cargo generate-lockfile --manifest-path src-tauri/Cargo.toml

      - name: Setup Rust compiler cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: windows-x64-release
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Test frontend
        run: npm test

      - name: Test Rust backend in release mode
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --release

      - name: Publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: --no-bundle --ci
          tagName: ${{ github.ref_name }}
          releaseName: Parquet Parley ${{ github.ref_name }}
          releaseBody: Download the portable Windows EXE from the assets below. It does not require admin rights.
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          releaseAssetNamePattern: Parquet-Parley-[version]-[platform]-[arch]-[bundle][ext]
          uploadPlainBinary: true
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: parquet-parley-[platform]-[arch]-[bundle]
